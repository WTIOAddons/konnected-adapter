name: Release

on:
  push:
    tags:
    - v[0-9]+.[0-9]+.[0-9]+

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [
          'linux-arm',
          'linux-arm64',
          'linux-x64',
          'darwin-x64',
        ]
        pair: [
          'python:3.7',
          'python:3.8',
          'python:3.9',
        ]
        include:
          - platform: 'linux-arm'
            host-os: 'ubuntu-latest'
          - platform: 'linux-arm64'
            host-os: 'ubuntu-latest'
          - platform: 'linux-x64'
            host-os: 'ubuntu-latest'
          - platform: 'darwin-x64'
            host-os: 'macos-latest'
          - pair: 'python:3.7'
            language: 'python'
            version: '3.7'
          - pair: 'python:3.8'
            language: 'python'
            version: '3.8'
          - pair: 'python:3.9'
            language: 'python'
            version: '3.9'
          # Python 3.7 is not available on ubuntu-24.04 (which is what
          # ubuntu-latest now resolves to). Pin the Linux 3.7 combinations
          # back to 22.04, the last image setup-python@v5 can find 3.7 on.
          - platform: 'linux-arm'
            pair: 'python:3.7'
            host-os: 'ubuntu-22.04'
          - platform: 'linux-arm64'
            pair: 'python:3.7'
            host-os: 'ubuntu-22.04'
          - platform: 'linux-x64'
            pair: 'python:3.7'
            host-os: 'ubuntu-22.04'
          # Same situation on macOS: macos-latest now resolves to macos-14
          # (arm64), which setup-python@v5 has no 3.7 entry for. macos-13
          # is the last x64 image and still has 3.7.
          - platform: 'darwin-x64'
            pair: 'python:3.7'
            host-os: 'macos-13'

    runs-on: ${{ matrix.host-os }}

    steps:
    - name: Set release version
      run: echo "RELEASE_VERSION=${GITHUB_REF:11}" >> $GITHUB_ENV
    - uses: actions/checkout@v4
    - name: Use Python ${{ matrix.version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.version }}
    - name: Build adapter
      run: |
        ./build.sh "${{ matrix.platform }}" "${{ matrix.language }}" "${{ matrix.version }}"
    - name: Publish release with assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          konnected-adapter-${{ env.RELEASE_VERSION }}-${{ matrix.platform }}-v${{ matrix.version }}.tgz
          konnected-adapter-${{ env.RELEASE_VERSION }}-${{ matrix.platform }}-v${{ matrix.version }}.tgz.sha256sum
